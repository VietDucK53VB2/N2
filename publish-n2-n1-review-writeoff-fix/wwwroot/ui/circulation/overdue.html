<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Circulation - Overdue</title>
</head>
<body>
  <h1>Danh sách sách quá hạn</h1>
  <button id="refresh">Load</button>
  <pre id="out"></pre>
  <script>
    document.getElementById('refresh').addEventListener('click', async () => {
      const r = await fetch('/api/circulation/overdue');
      const j = await r.json();
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    });
  </script>
</body>
</html>
