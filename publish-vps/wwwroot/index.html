<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartLib</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #0f5132, #0a3d25);
      color: #fff;
    }
    .card {
      width: min(720px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
    }
    h1 { margin: 0 0 12px; font-size: 32px; }
    p { margin: 0 0 20px; line-height: 1.6; opacity: 0.9; }
    a {
      display: inline-block;
      margin-right: 12px;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      background: #fff;
      color: #0f5132;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>SmartLib</h1>
    <p>Trang giới thiệu của hệ thống thư viện số.</p>
    <a href="/ui/librarian/">Vào thủ thư</a>
  </main>
</body>
</html>
